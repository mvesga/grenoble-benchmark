<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso Protegido · Benchmark TDAH+TSA · Grenoble</title>
<style>
  :root {
    --bg: #f4f1ec;
    --surface: #ffffff;
    --ink: #1a1a18;
    --ink-soft: #5a5850;
    --accent: #2d5a3d;
    --accent-light: #e8f0ea;
    --border: #e0dbd3;
    --red: #c0392b;
    --red-light: #fdecea;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Segoe UI', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px 40px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.08);
    text-align: center;
  }
  .logo {
    width: 56px; height: 56px;
    background: var(--accent);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    margin: 0 auto 24px;
  }
  h1 {
    font-size: 20px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .sub {
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 32px;
    line-height: 1.5;
  }
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-soft);
    text-align: left;
    margin-bottom: 8px;
  }
  input[type="password"] {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 16px;
    color: var(--ink);
    background: var(--bg);
    outline: none;
    transition: border-color 0.15s;
    letter-spacing: 0.1em;
  }
  input[type="password"]:focus { border-color: var(--accent); }
  input[type="password"].error { border-color: var(--red); background: var(--red-light); }
  button {
    width: 100%;
    margin-top: 16px;
    padding: 13px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  button:hover { opacity: 0.88; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .error-msg {
    margin-top: 12px;
    font-size: 13px;
    color: var(--red);
    display: none;
  }
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .footer-note {
    margin-top: 28px;
    font-size: 11px;
    color: var(--border);
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🧠</div>
  <h1>Documento Protegido</h1>
  <p class="sub">Benchmark · Asistencia Psicológica TDAH+TSA · Grenoble<br>Introduce la contraseña para continuar.</p>
  <label for="pw">Contraseña</label>
  <input type="password" id="pw" placeholder="••••••••••••" autofocus>
  <button id="btn" onclick="decrypt()">Acceder</button>
  <p class="error-msg" id="err">Contraseña incorrecta. Inténtalo de nuevo.</p>
  <p class="footer-note">AES-256-GCM · Cifrado en cliente</p>
</div>

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Descifrando…';
  err.style.display = 'none';
  pwInput.classList.remove('error');

  try {
    // Decode base64 payload
    const raw = Uint8Array.from(atob(PAYLOAD_B64), c => c.charCodeAt(0));
    const salt       = raw.slice(0, 32);
    const iv         = raw.slice(32, 44);
    const ciphertext = raw.slice(44);

    // Derive key with scrypt via PBKDF2-SHA256 polyfill using SubtleCrypto
    // We use the Web Crypto scrypt-equivalent: import password as key material
    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey(
      'raw', enc.encode(password), 'PBKDF2', false, ['deriveBits']
    );

    // NOTE: Web Crypto doesn't support scrypt natively.
    // We use PBKDF2-SHA256 with 200000 iterations as a strong KDF.
    // The Python encryptor below uses the same PBKDF2 parameters.
    const keyBits = await crypto.subtle.deriveBits(
      { name: 'PBKDF2', salt, iterations: 200000, hash: 'SHA-256' },
      keyMaterial, 256
    );

    const key = await crypto.subtle.importKey(
      'raw', keyBits, { name: 'AES-GCM' }, false, ['decrypt']
    );

    const decrypted = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv }, key, ciphertext
    );

    // Success — replace page with decrypted content
    const html = new TextDecoder().decode(decrypted);
    document.open();
    document.write(html);
    document.close();

  } catch (e) {
    pwInput.classList.add('error');
    err.style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = 'Acceder';
    pwInput.focus();
    pwInput.select();
  }
}

document.getElementById('pw').addEventListener('keydown', e => {
  if (e.key === 'Enter') decrypt();
});
</script>
